<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tamagotchi Monster</title>
    <style>
      * {
        box-sizing: border-box;
      }
      html,
      body {
        height: 100%;
        margin: 0;
        background: #0b0b12;
        overflow: hidden;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
          Roboto, sans-serif;
      }
      #app {
        position: fixed;
        inset: 0;
      }
      canvas {
        width: 100%;
        height: 100%;
        display: block;
        touch-action: none;
      }
      .hint {
        position: fixed;
        left: 12px;
        bottom: 10px;
        font-size: 12px;
        color: rgba(255, 255, 255, 0.55);
        user-select: none;
        pointer-events: none;
        letter-spacing: 0.02em;
      }
      .top-left {
        position: fixed;
        left: 12px;
        top: 10px;
        display: flex;
        gap: 10px;
        align-items: center;
        z-index: 2;
      }
      .top-left a {
        font-size: 12px;
        color: rgba(255, 255, 255, 0.7);
        text-decoration: none;
      }
      .top-left a:hover {
        color: rgba(255, 255, 255, 0.95);
        text-decoration: underline;
      }
    </style>
  </head>
  <body>
    <div id="app">
      <canvas id="game" aria-label="Tamagotchi Monster canvas"></canvas>
    </div>
    <div class="top-left">
      <a href="../../">← Menu</a>
    </div>
    <div class="hint">Press <b>I</b> for Monster Index</div>
    <script type="module" src="./main.ts"></script>
  </body>
</html>

<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tamagotchi Monster</title>
    <style>
      * {
        box-sizing: border-box;
      }
      html,
      body {
        height: 100%;
        margin: 0;
        background: #0b0b12;
        overflow: hidden;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
          Roboto, sans-serif;
      }
      #app {
        position: fixed;
        inset: 0;
      }
      canvas {
        width: 100%;
        height: 100%;
        display: block;
        touch-action: none;
      }
      .hint {
        position: fixed;
        left: 12px;
        bottom: 10px;
        font-size: 12px;
        color: rgba(255, 255, 255, 0.55);
        user-select: none;
        pointer-events: none;
        letter-spacing: 0.02em;
      }
      .top-left {
        position: fixed;
        left: 12px;
        top: 10px;
        display: flex;
        gap: 10px;
        align-items: center;
        z-index: 2;
      }
      .top-left a {
        font-size: 12px;
        color: rgba(255, 255, 255, 0.7);
        text-decoration: none;
      }
      .top-left a:hover {
        color: rgba(255, 255, 255, 0.95);
        text-decoration: underline;
      }
      body.tm-impact-warning #app,
      body.tm-impact-warning .top-left,
      body.tm-impact-warning .hint {
        transform: scale(1.18);
        filter: saturate(1.35) contrast(1.18);
        transition:
          transform 900ms cubic-bezier(0.13, 0.86, 0.2, 1),
          filter 900ms ease;
      }
      body.tm-impact-paused #app,
      body.tm-impact-paused .top-left,
      body.tm-impact-paused .hint,
      body.tm-impact-paused #imported-aheg-trophy {
        filter: saturate(0.2) contrast(1.35);
        pointer-events: none;
      }
      #tm-crack-overlay {
        position: fixed;
        inset: 0;
        z-index: 3000;
        pointer-events: none;
        opacity: 0;
      }
      body.tm-cracking #tm-crack-overlay {
        opacity: 1;
      }
      .tm-crack-core,
      .tm-crack-shard {
        position: absolute;
        left: 50%;
        top: 50%;
        transform: translate(-50%, -50%);
      }
      .tm-crack-core {
        width: min(74vw, 760px);
        height: min(74vw, 760px);
        background:
          linear-gradient(94deg, transparent 0 48%, rgba(255, 255, 255, 0.96) 49% 51%, transparent 52%),
          linear-gradient(24deg, transparent 0 46%, rgba(255, 255, 255, 0.84) 47% 49%, transparent 50%),
          linear-gradient(151deg, transparent 0 50%, rgba(255, 255, 255, 0.72) 51% 53%, transparent 54%),
          radial-gradient(circle, transparent 0 9%, rgba(255, 255, 255, 0.95) 10% 11%, transparent 12%);
        filter:
          drop-shadow(0 0 4px rgba(255, 255, 255, 0.9))
          drop-shadow(0 0 12px rgba(120, 240, 255, 0.28));
        animation: tm-crack-pop 520ms steps(2) both;
      }
      .tm-crack-shard {
        width: 46vw;
        height: 46vh;
        background: rgba(255, 255, 255, 0.08);
        border: 2px solid rgba(255, 255, 255, 0.42);
        clip-path: polygon(48% 0, 100% 35%, 78% 100%, 0 64%);
        backdrop-filter: invert(0.18) contrast(1.4);
        opacity: 0;
      }
      .shard-1 {
        --tx: -44vw;
        --ty: -38vh;
        --rot: -24deg;
      }
      .shard-2 {
        --tx: 42vw;
        --ty: -34vh;
        --rot: 18deg;
      }
      .shard-3 {
        --tx: -40vw;
        --ty: 42vh;
        --rot: 31deg;
      }
      .shard-4 {
        --tx: 38vw;
        --ty: 40vh;
        --rot: -28deg;
      }
      .shard-5 {
        --tx: 0;
        --ty: 52vh;
        --rot: 12deg;
      }
      body.tm-cracking .tm-crack-shard {
        opacity: 1;
      }
      body.tm-crack-breaks .tm-crack-shard {
        animation: tm-shard-break 860ms cubic-bezier(0.4, 0, 1, 0.6) forwards;
      }
      body.tm-blackout::after {
        content: "";
        position: fixed;
        inset: 0;
        z-index: 5000;
        background: #000;
        animation: tm-blackout 900ms ease forwards;
      }
      @keyframes tm-crack-pop {
        0% {
          transform: translate(-50%, -50%) scale(0.1) rotate(0deg);
          opacity: 0;
        }
        100% {
          transform: translate(-50%, -50%) scale(1) rotate(-2deg);
          opacity: 1;
        }
      }
      @keyframes tm-shard-break {
        to {
          transform: translate(calc(-50% + var(--tx)), calc(-50% + var(--ty))) rotate(var(--rot));
          opacity: 0;
        }
      }
      @keyframes tm-blackout {
        from {
          opacity: 0;
        }
        to {
          opacity: 1;
        }
      }
    </style>
  </head>
  <body>
    <div id="app">
      <canvas id="game" aria-label="Tamagotchi Monster canvas"></canvas>
    </div>
    <div class="top-left">
      <a href="../../">← Menu</a>
    </div>
    <div class="hint">Press <b>I</b> for Monster Index</div>
    <script type="module" src="./main.ts"></script>
  </body>
</html>

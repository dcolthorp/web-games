<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>A Hard Easy Game</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="page">
      <a class="back-link" href="../../">← Menu</a>
      <section class="hero">
        <p class="eyebrow">Totally brutal. Probably.</p>
        <h1 class="title-lockup">
          <span class="title-prefix">A</span>
          <span class="title-word-stack" aria-label="Hard Easy">
            <span class="crossed-out">Hard</span>
          </span>
          <span class="spray-painted">Easy</span>
          <span class="title-suffix">Game</span>
        </h1>
        <p class="subtitle">
          Reach the glowing exit. Ignore the drama. Most of it is decorative.
        </p>
      </section>

      <section class="hud" aria-label="Game information">
        <p id="status">Use arrow keys or WASD to move.</p>
        <div class="level-selector" aria-label="Level selector">
          <button id="level-1-btn" type="button">Level 1</button>
          <button id="level-2-btn" type="button">Level 2</button>
        </div>
        <div class="hud-meter" id="health-hud" hidden>
          <span class="hud-meter-label">Health</span>
          <div class="hud-meter-track" aria-hidden="true">
            <div class="hud-meter-fill" id="health-fill"></div>
          </div>
          <span class="hud-meter-value" id="health-value">100 / 100</span>
        </div>
        <p id="best-time">Best time: not set</p>
        <button id="reset-aheg-btn" type="button" aria-label="Reset A Hard Easy Game" title="Reset A Hard Easy Game">↺</button>
        <button id="restart-btn" type="button">Restart</button>
      </section>

      <section class="board-wrap">
        <canvas
          id="game"
          width="800"
          height="520"
          aria-label="A Hard Easy Game play area"
        ></canvas>
      </section>
    </main>

    <script type="module" src="./main.ts"></script>
  </body>
</html>

<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Games 2</title>
    <link rel="stylesheet" href="../styles/main.css" />
  </head>
  <body>
    <main class="menu-shell">
      <section class="hero-panel">
        <p class="eyebrow">The sequel nobody asked for</p>
        <div class="title-row">
          <h1>Games 2</h1>
          <a class="hub-toggle" href="../" aria-label="Back to Games">
            <svg viewBox="0 0 32 24" aria-hidden="true" focusable="false">
              <path d="M3 5 L16 18 L29 5" fill="none" stroke="currentColor" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" />
            </svg>
          </a>
        </div>
        <p class="subtitle">Bigger number. Same energy.</p>
        <div class="hero-stripes" aria-hidden="true"></div>
      </section>

      <section class="menu-container" aria-labelledby="game-list-heading">
        <div class="section-header">
          <h2 id="game-list-heading">Choose Your Disaster, Again</h2>
          <p class="section-copy">New floors. New traps. New regrets.</p>
        </div>
        <ul class="game-list" id="game-list">
          <!-- Games 2 entries go here -->
        </ul>
      </section>

      <button class="trap-floor" id="trap-floor-2" type="button" aria-label="Please trust me floor">
        PLEASE TRUST ME!
      </button>
    </main>
    <script type="module" src="./main.ts"></script>
  </body>
</html>
